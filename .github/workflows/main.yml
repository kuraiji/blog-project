name: test project
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
jobs:
  test:
    name: test project
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: setup jdk 26
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: 26
          cache: 'maven'

      - name: unit tests
        run: mvn -B test --file blog/pom.xml