name: test project
on:
  push:
    branches:
      - main
jobs:
  test:
    name: test project
    runs-on: ubuntu-22.04
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: setup jdk 26
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: 26

      - name: unit tests
        run: mvn -B test --file blog/pom.xml